  <title>뭐해먹냐?</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Gmarket+Sans:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #FF6B35;
      --orange-light: #FF8C5A;
      --orange-pale: #FFF0EA;
      --brown: #3D1F0D;
      --cream: #FFFBF7;
      --gray: #8C7B70;
      --gray-light: #F5EDE8;
      --green: #4CAF7D;
      --red: #E84855;
      --border: #EBE0D8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--cream);
      color: var(--brown);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
    }

    /* ── SPLASH ── */
    #splash {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--orange);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.6s ease;
    }
    #splash .logo-big {
      font-family: 'Gmarket Sans', sans-serif;
      font-size: 2.8rem; font-weight: 700;
      color: #fff; letter-spacing: -1px;
      animation: popIn 0.5s ease 0.2s both;
    }
    #splash .sub { color: rgba(255,255,255,0.8); margin-top: 8px; font-size: 1rem; animation: popIn 0.5s ease 0.4s both; }
    #splash .emoji { font-size: 4rem; margin-bottom: 16px; animation: bounce 1s ease infinite; }
    @keyframes popIn { from { opacity:0; transform: scale(0.8) } to { opacity:1; transform: scale(1) } }
    @keyframes bounce { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-10px) } }

    /* ── LAYOUT ── */
    #app { display: none; flex-direction: column; min-height: 100vh; }
    
    /* ── HEADER ── */
    header {
      background: var(--orange);
      padding: 16px 20px 20px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(255,107,53,0.3);
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Gmarket Sans', sans-serif; font-size: 1.5rem; font-weight: 700; color: #fff; }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: none;
      color: #fff; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .icon-btn:active { background: rgba(255,255,255,0.35); }

    /* meal type tabs */
    .meal-tabs {
      display: flex; gap: 6px; margin-top: 12px;
      overflow-x: auto; scrollbar-width: none; padding-bottom: 2px;
    }
    .meal-tabs::-webkit-scrollbar { display: none; }
    .meal-tab {
      flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
      font-size: 0.8rem; font-weight: 500; cursor: pointer; border: none;
      background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.85);
      transition: all 0.2s;
    }
    .meal-tab.active { background: #fff; color: var(--orange); font-weight: 700; }

    /* ── MAIN ── */
    main { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

    /* ── SECTION CARD ── */
    .card {
      background: #fff; border-radius: 20px;
      padding: 16px; box-shadow: 0 2px 12px rgba(61,31,13,0.06);
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 0.75rem; font-weight: 700; color: var(--gray);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
    }

    /* ── PERSON SELECTOR ── */
    .person-row { display: flex; align-items: center; gap: 12px; }
    .person-label { font-size: 0.95rem; flex: 1; }
    .counter { display: flex; align-items: center; gap: 10px; }
    .counter-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid var(--orange); background: #fff;
      color: var(--orange); font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; transition: all 0.15s;
    }
    .counter-btn:active { background: var(--orange); color: #fff; }
    .counter-num { font-size: 1.3rem; font-weight: 700; min-width: 24px; text-align: center; }

    /* ── FRIDGE ── */
    .fridge-section { display: flex; flex-direction: column; gap: 10px; }
    .fridge-zone { }
    .zone-header {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.85rem; font-weight: 700; margin-bottom: 8px;
    }
    .zone-badge {
      padding: 2px 8px; border-radius: 10px; font-size: 0.72rem;
      font-weight: 600;
    }
    .badge-cold { background: #E3F2FD; color: #1565C0; }
    .badge-freeze { background: #E8EAF6; color: #283593; }

    .ingredient-grid {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .ingredient-chip {
      padding: 6px 12px; border-radius: 20px; font-size: 0.83rem;
      border: 1.5px solid var(--border); background: #fff;
      cursor: pointer; transition: all 0.15s; font-weight: 500;
      user-select: none;
    }
    .ingredient-chip.selected {
      background: var(--orange); border-color: var(--orange);
      color: #fff; transform: scale(1.02);
    }
    .ingredient-chip.custom {
      border-style: dashed; color: var(--gray);
    }

    /* custom input */
    .add-ingredient-row {
      display: flex; gap: 6px; margin-top: 6px;
    }
    .add-input {
      flex: 1; padding: 7px 12px; border-radius: 20px;
      border: 1.5px solid var(--border); font-size: 0.85rem;
      font-family: inherit; outline: none; background: var(--gray-light);
      transition: border 0.2s;
    }
    .add-input:focus { border-color: var(--orange); background: #fff; }
    .add-btn {
      padding: 7px 14px; border-radius: 20px;
      background: var(--orange); color: #fff; border: none;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
    }

    /* ── CTA BUTTON ── */
    .cta-btn {
      width: 100%; padding: 18px;
      background: var(--orange); color: #fff; border: none;
      border-radius: 20px; font-size: 1.1rem; font-weight: 700;
      font-family: 'Gmarket Sans', sans-serif;
      cursor: pointer; letter-spacing: -0.5px;
      box-shadow: 0 4px 20px rgba(255,107,53,0.4);
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .cta-btn:active { transform: scale(0.97); }
    .cta-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
    .cta-btn .btn-sub { font-size: 0.78rem; opacity: 0.85; font-family: 'Noto Sans KR', sans-serif; font-weight: 400; }

    /* ── RESULT PANEL ── */
    #result-panel {
      display: none; flex-direction: column; gap: 16px;
    }
    .result-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .result-title { font-family: 'Gmarket Sans', sans-serif; font-size: 1.2rem; font-weight: 700; }
    .back-btn {
      padding: 6px 14px; border-radius: 20px;
      border: 1.5px solid var(--border); background: #fff;
      font-size: 0.82rem; cursor: pointer; font-weight: 500;
    }

    /* menu card */
    .menu-card {
      background: #fff; border-radius: 20px;
      border: 1.5px solid var(--border);
      overflow: hidden; cursor: pointer;
      box-shadow: 0 2px 10px rgba(61,31,13,0.05);
      transition: all 0.2s;
    }
    .menu-card:active { transform: scale(0.98); }
    .menu-card-header {
      padding: 16px; display: flex; align-items: flex-start;
      gap: 12px; border-bottom: 1px solid var(--border);
    }
    .menu-emoji { font-size: 2rem; }
    .menu-info { flex: 1; }
    .menu-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
    .menu-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .menu-tag {
      font-size: 0.72rem; padding: 2px 7px; border-radius: 8px;
      font-weight: 500;
    }
    .tag-time { background: var(--orange-pale); color: var(--orange); }
    .tag-diff { background: #F0FFF4; color: var(--green); }
    .tag-type { background: var(--gray-light); color: var(--gray); }

    .menu-card-body { padding: 14px 16px; }
    .recipe-steps { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .recipe-step {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 0.87rem; line-height: 1.5;
    }
    .step-num {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--orange); color: #fff; font-size: 0.7rem;
      font-weight: 700; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }

    .ingredients-used {
      margin-top: 12px; padding-top: 10px;
      border-top: 1px dashed var(--border);
      font-size: 0.78rem; color: var(--gray);
    }
    .ingredients-used strong { color: var(--brown); }

    /* ── LOADING ── */
    .loading-wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px; gap: 16px;
    }
    .loading-pot { font-size: 3rem; animation: shake 0.5s ease infinite alternate; }
    @keyframes shake { from { transform: rotate(-5deg) } to { transform: rotate(5deg) } }
    .loading-text { font-size: 1rem; color: var(--gray); font-weight: 500; }
    .loading-dots::after { content: ''; animation: dots 1.5s steps(4) infinite; }
    @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

    /* ── HISTORY ── */
    #history-panel { display: none; }
    .history-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .history-item:last-child { border-bottom: none; }
    .history-emoji { font-size: 1.4rem; }
    .history-info { flex: 1; }
    .history-name { font-size: 0.9rem; font-weight: 600; }
    .history-date { font-size: 0.75rem; color: var(--gray); }
    .history-del { color: var(--gray); font-size: 1rem; cursor: pointer; padding: 4px; }

    /* ── SETTINGS PANEL ── */
    #settings-panel { display: none; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--brown); color: #fff; padding: 10px 20px;
      border-radius: 20px; font-size: 0.85rem; opacity: 0;
      transition: all 0.3s; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── ERROR ── */
    .error-box {
      background: #FFF5F5; border: 1px solid #FED7D7;
      border-radius: 16px; padding: 16px; text-align: center;
      color: var(--red); font-size: 0.9rem;
    }

    /* ── API KEY SETUP ── */
    #apikey-panel {
      display: none; flex-direction: column; gap: 16px; padding: 20px;
    }
    .setup-title { font-family: 'Gmarket Sans', sans-serif; font-size: 1.4rem; font-weight: 700; text-align: center; }
    .setup-desc { font-size: 0.88rem; color: var(--gray); text-align: center; line-height: 1.6; }
    .api-input {
      width: 100%; padding: 14px 16px; border-radius: 16px;
      border: 1.5px solid var(--border); font-size: 0.9rem;
      font-family: inherit; outline: none;
      transition: border 0.2s;
    }
    .api-input:focus { border-color: var(--orange); }

    /* selected count badge */
    .selected-count {
      font-size: 0.78rem; color: var(--orange); font-weight: 600;
      margin-left: 6px;
    }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="emoji">🍳</div>

<div id="app">

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── DATA ──
const COLD_INGREDIENTS = [
  '계란','김치','두부','대파','마늘','양파','당근','감자','고추',
  '시금치','콩나물','버섯','애호박','무','오이','토마토','깻잎',
  '된장','고추장','간장','돼지고기','닭고기','소고기','베이컨',
  '햄','어묵','치즈','우유','두유','요거트','밥(냉장)','파프리카'
];
const FREEZE_INGREDIENTS = [
  '냉동밥','냉동만두','냉동새우','냉동오징어','냉동고기',
  '냉동닭','냉동야채믹스','냉동피자','냉동떡','참치캔','스팸',
  '고등어','삼겹살(냉동)','다진마늘(냉동)','냉동옥수수'
];

let state = {
  persons: 2,
  mealType: '아침',
  coldSelected: [],
  freezeSelected: [],
  coldCustom: [],
  freezeCustom: [],
  history: [],
  apiKey: ''
};

// ── INIT ──
window.onload = () => {
  loadState();
  renderIngredients();
  setTimeout(() => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
    }, 600);
  }, 1500);
};

function loadState() {
  try {
    const saved = localStorage.getItem('mhm_state');
    if (saved) {
      const s = JSON.parse(saved);
      state = { ...state, ...s };
    }
    const key = localStorage.getItem('mhm_apikey');
    if (key) state.apiKey = key;
    const apiInput = document.getElementById('api-key-input');
    if (apiInput && state.apiKey) apiInput.value = state.apiKey;
  } catch(e) {}
}

function resetZone(zone) {
  if (zone === 'cold') {
    state.coldSelected = [];
    state.coldCustom = [];
    showToast('🧊 냉장실 초기화됐어!');
  } else {
    state.freezeSelected = [];
    state.freezeCustom = [];
    showToast('❄️ 냉동실 초기화됐어!');
  }
  renderIngredients();
  saveState();
}

function saveState() {
  const toSave = { ...state };
  delete toSave.apiKey;
  localStorage.setItem('mhm_state', JSON.stringify(toSave));
}

// ── RENDER ──
function renderIngredients() {
  renderGrid('cold', COLD_INGREDIENTS, state.coldCustom, state.coldSelected);
  renderGrid('freeze', FREEZE_INGREDIENTS, state.freezeCustom, state.freezeSelected);
  updateCounts();
}

function renderGrid(zone, base, custom, selected) {
  const grid = document.getElementById(`${zone}-grid`);
  const all = [...base, ...custom];
  grid.innerHTML = all.map(item => `
    <div class="ingredient-chip ${selected.includes(item) ? 'selected' : ''} ${custom.includes(item) ? 'custom' : ''}"
      onclick="toggleIngredient('${zone}','${item}')">
      ${item}
    </div>
  `).join('');
}

function updateCounts() {
  const cc = state.coldSelected.length;
  const fc = state.freezeSelected.length;
  document.getElementById('cold-count').textContent = cc > 0 ? `${cc}개 선택` : '';
  document.getElementById('freeze-count').textContent = fc > 0 ? `${fc}개 선택` : '';
}

// ── INTERACTIONS ──
function toggleIngredient(zone, item) {
  const key = zone === 'cold' ? 'coldSelected' : 'freezeSelected';
  const idx = state[key].indexOf(item);
  if (idx > -1) state[key].splice(idx, 1);
  else state[key].push(item);
  renderIngredients();
  saveState();
}

function addCustom(zone) {
  const input = document.getElementById(`${zone}-input`);
  const val = input.value.trim();
  if (!val) return;
  const customKey = zone === 'cold' ? 'coldCustom' : 'freezeCustom';
  const selectedKey = zone === 'cold' ? 'coldSelected' : 'freezeSelected';
  if (!state[customKey].includes(val) && !COLD_INGREDIENTS.includes(val) && !FREEZE_INGREDIENTS.includes(val)) {
    state[customKey].push(val);
  }
  if (!state[selectedKey].includes(val)) state[selectedKey].push(val);
  input.value = '';
  renderIngredients();
  saveState();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.activeElement.id === 'cold-input') addCustom('cold');
    if (document.activeElement.id === 'freeze-input') addCustom('freeze');
  }
});

function changePerson(delta) {
  state.persons = Math.max(1, Math.min(10, state.persons + delta));
  document.getElementById('person-count').textContent = state.persons;
  saveState();
}

// meal tabs
document.querySelectorAll('.meal-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.meal-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.mealType = tab.dataset.meal;
    saveState();
  });
});

// ── VIEW MANAGEMENT ──
function showView(id) {
  ['main-view','result-view','history-view','settings-view'].forEach(v => {
    document.getElementById(v).style.display = 'none';
  });
  document.getElementById(id).style.display = 'flex';
}

function goBack() { showView('main-view'); }

function showHistory() {
  renderHistory();
  showView('history-view');
}

function showSettings() {
  showView('settings-view');
}

function resetAll() {
  if (!confirm('선택한 재료를 모두 초기화할까?')) return;
  state.coldSelected = [];
  state.freezeSelected = [];
  state.coldCustom = [];
  state.freezeCustom = [];
  renderIngredients();
  saveState();
  showToast('🔄 재료 초기화됐어!');
  goBack();
}

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-')) { showToast('올바른 API Key를 입력해줘'); return; }
  state.apiKey = val;
  localStorage.setItem('mhm_apikey', val);
  showToast('✅ API Key 저장됐어!');
  goBack();
}

// ── HISTORY ──
function renderHistory() {
  const list = document.getElementById('history-list');
  if (state.history.length === 0) {
    list.innerHTML = '<p style="color:var(--gray);text-align:center;padding:20px;">아직 기록이 없어</p>';
    return;
  }
  list.innerHTML = state.history.slice().reverse().map((h, i) => `
    <div class="history-item">
      <div class="history-emoji">${h.emoji || '🍽️'}</div>
      <div class="history-info">
        <div class="history-name">${h.name}</div>
        <div class="history-date">${h.date} · ${h.meal}</div>
      </div>
      <div class="history-del" onclick="deleteHistory(${state.history.length - 1 - i})">✕</div>
    </div>
  `).join('');
}

function deleteHistory(idx) {
  state.history.splice(idx, 1);
  saveState();
  renderHistory();
}

function addToHistory(menu) {
  state.history.push({
    name: menu.name,
    emoji: menu.emoji,
    meal: state.mealType,
    date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' })
  });
  if (state.history.length > 50) state.history.shift();
  saveState();
}

// ── MEAL TIME CONFIRM ──
function confirmMealTime() {
  const current = state.mealType;
  const options = ['아침','점심','저녁','간식','야식','술안주'];
  const emojis = {'아침':'🌅','점심':'☀️','저녁':'🌙','간식':'🍪','야식':'🌃','술안주':'🍺'};
  
  const msg = `지금 ${emojis[current]} ${current} 맞아?\n아니면 위에서 다시 선택해줘!`;
  if (confirm(msg)) {
    getSuggestions();
  }
}

async function getSuggestions() {
  const allIngredients = [...state.coldSelected, ...state.freezeSelected];
  if (allIngredients.length === 0) {
    showToast('재료를 하나라도 골라봐! 🥕');
    return;
  }

  showView('result-view');
  document.getElementById('result-title').textContent = `${state.mealType} 추천 메뉴 🍽️`;
  document.getElementById('result-content').innerHTML = `
    <div class="loading-wrap">
      <div class="loading-pot">🍳</div>
      <div class="loading-text">AI가 메뉴 생각 중<span class="loading-dots"></span></div>
    </div>
  `;

  const recentHistory = state.history.slice(-10).map(h => h.name).join(', ');

  const prompt = `당신은 한국 가정식 요리 전문가야.

사용자 정보:
- 식사 종류: ${state.mealType}
- 인원: ${state.persons}명
- 냉장실 재료: ${state.coldSelected.join(', ') || '없음'}
- 냉동실 재료: ${state.freezeSelected.join(', ') || '없음'}
- 최근에 먹은 메뉴 (중복 피해야 함): ${recentHistory || '없음'}

위 재료로 만들 수 있는 메뉴 3가지를 추천해줘.
- 반드시 선택된 재료만 사용해서 만들 수 있는 메뉴만 추천해
- 단품이어도 되고, 세트여도 돼 (예: 김치볶음밥, 또는 밥+된장국+나물)
- 조리법은 최대한 간단하게 (5단계 이하)
- 최근 먹은 메뉴와 겹치지 않게
- ${state.persons}명 기준 분량으로

반드시 아래 JSON 형식으로만 응답해 (다른 텍스트 없이):
{
  "menus": [
    {
      "name": "메뉴 이름",
      "emoji": "음식 이모지 1개",
      "type": "단품 또는 세트",
      "time": "조리시간 (예: 10분)",
      "difficulty": "쉬움/보통",
      "ingredients": ["사용재료1", "사용재료2"],
      "steps": ["1단계", "2단계", "3단계"]
    }
  ]
}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || 'API 오류');
    }

    const data = await response.json();
    const text = data.content[0].text;
    const jsonMatch = text.match(/[\s\S]*}/);
    if (!jsonMatch) throw new Error('응답 형식 오류');
    const parsed = JSON.parse(jsonMatch[0]);
    renderMenus(parsed.menus);

  } catch (err) {
    document.getElementById('result-content').innerHTML = `
      <div class="error-box">
        😢 오류가 났어<br><small>${err.message}</small>
      </div>
    `;
  }
}

function renderMenus(menus) {
  const html = menus.map(menu => `
    <div class="menu-card" onclick="toggleRecipe(this, '${menu.name.replace(/'/g,"\\'")}')">
      <div class="menu-card-header">
        <div class="menu-emoji">${menu.emoji}</div>
        <div class="menu-info">
          <div class="menu-name">${menu.name}</div>
          <div class="menu-tags">
            <span class="menu-tag tag-time">⏱ ${menu.time}</span>
            <span class="menu-tag tag-diff">${menu.difficulty}</span>
            <span class="menu-tag tag-type">${menu.type}</span>
          </div>
        </div>
        <button onclick="event.stopPropagation(); eatThis('${menu.name.replace(/'/g,"\\'")}', '${menu.emoji}')" 
          style="background:var(--orange);color:#fff;border:none;border-radius:12px;padding:6px 10px;font-size:0.78rem;cursor:pointer;font-weight:700;white-space:nowrap;">
          먹었어 ✓
        </button>
      </div>
      <div class="menu-card-body" style="display:none;">
        <ol class="recipe-steps">
          ${menu.steps.map((s,i) => `
            <li class="recipe-step">
              <div class="step-num">${i+1}</div>
              <div>${s}</div>
            </li>
          `).join('')}
        </ol>
        <div class="ingredients-used">
          <strong>사용 재료:</strong> ${menu.matched ? menu.matched.join(', ') : menu.ingredients.join(', ')}
          ${menu.missing && menu.missing.length > 0 ? `<br><span style="color:#E65100;">✚ 있으면 좋아: ${menu.missing.join(', ')}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('result-content').innerHTML = `
    <p style="font-size:0.82rem;color:var(--gray);margin-bottom:8px;">👆 카드 눌러서 조리법 확인</p>
    <div style="display:flex;flex-direction:column;gap:10px;">${html}</div>
    <button class="cta-btn" style="margin-top:8px;" onclick="getSuggestions()">
      🔄 다른 메뉴 추천받기
    </button>
  `;
}

function toggleRecipe(card, name) {
  const body = card.querySelector('.menu-card-body');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
}

function eatThis(name, emoji) {
  addToHistory({ name, emoji });
  showToast(`${emoji} ${name} 맛있게 먹어! 🙏`);
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
